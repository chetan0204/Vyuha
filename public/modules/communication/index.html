<!DOCTYPE html>
<html>

<head>

    <title>Vyuha P2P</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>


    <div class="container">

        <h1>Vyuha Crisis Communication</h1>

        <button id="joinBtn">
            Join Emergency Room
        </button>

        <div class="status" id="status">
            Not Connected
        </div>

        <div class="chat-box" id="chatBox"></div>

        <div class="input-area">

            <input 
                type="text"
                id="messageInput"
                placeholder="Type emergency message..."
            >

            <button id="sendBtn">
                Send
            </button>
            <button id="locationBtn">
    Share Location
</button>

        </div>

    </div>

    <script>
(function () {

  var base =
    "https://vyuha-backend.onrender.com";

  var s =
    document.createElement(
      "script"
    );

  s.src =
    base +
    "/socket.io/socket.io.js";

  s.onload =
    function () {

      window.__VYUHA_P2P__ =
        base;

      var a =
        document.createElement(
          "script"
        );

      a.src =
        "app.js";

      document.body.appendChild(
        a
      );
    };

  s.onerror =
    function () {

      var el =
        document.getElementById(
          "status"
        );

      if (el) {

        el.textContent =
          "Communication server unavailable";
      }
    };

  document.head.appendChild(
    s
  );

})();
</script>

</body>

</html>
